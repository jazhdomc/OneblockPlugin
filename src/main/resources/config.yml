# This is the config file for OneblockPlugin

# WARNING: DO NOT MEDDLE WITH THE FIELD "islands" BECAUSE THAT WILL BREAK THE ONEBLOCKS
# WARNING: DO NOT DELETE ANY FIELDS OR THINGS WON'T WORK

# The distance between each island (when subtracted)
island-spacing: 1000

# The index of the next oneblock (Changing this without knowing how it works will probably break the selection system)
next-island-index: 0

# The message displayed when players teleport to their oneblock home
oneblock-home-msg: Teleporting you to your oneblock home...

# The message displayed when teleporting to someone's oneblock (%p is the playername who's oneblock the teleportation is to)
oneblock-visit-msg: Teleporting to %p's oneblock...

# Oneblock reset warning displayed when doing reset without confirm
oneblock-reset-warning: "Warning: Resetting your island is permenant. Do \"/oneblock reset confirm\" to confirm."

# The message shown when "/oneblock phasecount" is done (%p is the phase and %c is the blockcount)
phasecount-msg: "Current Phase: %p \nBlock Count: %c"

# Playerlist (using the command /oneblock list) header
oneblock-list-header: === Oneblock Player List ===

# Player info (using the command /oneblock user <player>) header (%p for playername)
oneblock-user-header: === Oneblock Player %p Info ===

# Trusted list header
trusted-list-header: === Trusted List ===

# Default yaw and pitch values for player home
default-home-yaw: 0
default-home-pitch: 0

# Default yaw and pitch values for visitor spawn
default-spawn-yaw: 0
default-spawn-pitch: 0

# The world that the oneblocks should be in
oneblock-world: world

# The y-level of the oneblock
oneblock-y: 63

# Starter blocks (to prevent impossible situations) (same format as phase blocks but without chests)
starter:
  - GRASS:0
  - DIRT:0
  - GRASS:0
  - DIRT:0
  - LOG:0
  - LOG:0
  - LOG:0
  - LOG:0
  - STONE:0
  - STONE:0
  - STONE:0
  - STONE:0
  - STONE:0
  - STONE:0
  - STONE:0
  - STONE:0

# The prefix to use for sending messages to players
msg-prefix: "[OneblockPlugin] "

# Guide shown when a player does /oneblock guide
guide: "Welcome to JazhdoMC's oneblock server!\n\nUse the command: \"/ob new\" to get started.\nUse the command: \"/ob phase\" to check your current phase and/or switch to a phase after completing them all.\nYour land spans from (oneblock-x + 500, oneblock-z + 500) to (oneblock-x - 499, oneblock-z - 499)\n\nUse the command \"/ob help\" for help."

# Phases (max 28 for the phase selection)
phases:
  - plains
  - underground
  - winter
  - badlands
  - nether
  - monument
  - stronghold
  - supplies
  - end

# Phase descriptions
phase-descriptions:
  - A grassy starter phase
  - All the things you find underground on your first mining trip
  - A snowy landscape
  - Some horrible land, but with many colors
  - A lava-filled wasteland
  - A hard to beat fortress in the middle of the ocean
  - Many supplies to get you ready to beat something...
  - After such a long time, finally... THE FINALE!

# Phase menu
phase-menu:
  # The icons to represent phases in the phase selector ui (will silently fail if cooresponding phase not found)
  icons:
    - GRASS
    - STONE
    - SNOW_BLOCK
    - HARD_CLAY
    - NETHERRACK
    - PRISMARINE
    - PURPUR_BLOCK
    - HAY_BLOCK
    - ENDER_STONE
  
  # The block to be used as the border (format: BLOCK:METADATA)
  border: STAINED_GLASS_PANE:15

  # The display for phases not yet locked (format: BLOCK:METADATA)
  locked: STAINED_GLASS_PANE:8

  # Phases GUI title
  title: Phases Selector GUI

# The number of blocks in each phase
phase-length: [300, 200, 150, 250, 350, 100, 150, 550, 400]

