    - taming
    - vehicle-use

  # Descriptions to be shown on what each permission does
  descriptions:
    - Use a anvil
    - Use a bed
    - Break any blocks
    - Interact with (Right click) any blocks
    - Place any blocks
    - Breed animals
    - Use a brewing stand
    - Empty a bucket
    - Fill a bucket
    - Use a chest
    - Use a crafting table
    - Trample crops (A subsection of block-interact)
    - Use a enchantment table
    - Use a furnace
    - Use a flint and steel
    - Attack a animal
    - Attack a hostile mob
    - Drop items
    - Pick items up
    - Be damaged by mobs
    - Use a ender pearl
    - Move away from the position they are at
    - Use a nether portal
    - Player vs player attack
    - Use a shulker box
    - Tame a animal
    - Ride anything

