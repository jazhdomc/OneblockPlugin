# Help message customization
help:
  # Header of the help menu
  header: === Oneblock Help ===

  # Color of the header in ChatColor. format
  header-color: GOLD

  # Commands
  cmds:
    - guide
    - help
    - home
    - perm <visitor|trusted>
    - phase
    - phasecheck
    - reset
    - resethome
    - sethome [<x> <y> <z>[ <yaw> <pitch>]]
    - setspawn [<x> <y> <z>[ <yaw> <pitch>]]
    - spawn
    - tpa <player>
    - tpr <player>
    - trust <player>|all
    - trustlist
    - untrust <player>|all
    - visit <player>
  
  # Color of the commands in ChatColor. format
  cmd-color: YELLOW

  # Messages corresponding to the commands
  msgs:
    - Shows a guide for how to play oneblock
    - Shows this help message
    - Teleports you to your oneblock or creates one if you don't have one
    - Menu to edit permissions for trusted players and visitors
    - Opens a phase selection interface
    - Tells you your phase and block count
    - Resets your Oneblock island
    - Resets your Oneblock home to the default location (above the oneblock)
    - Sets your oneblock home
    - Sets your visitor spawn
    - Teleports you to your visitor spawn (same as "/oneblock visit <your_playername>")
    - Accepts a request to tp from a player
    - Requests to tp to a player
    - Trusts a player or everyone online
    - Lists everyone who's trusted
    - Untrusts a player or everyone
    - Visit a player's island

  # Color of the messages in ChatColor. format
  msg-color: GRAY

# Mod help message customization
mod-help:
  # Header of the mod help menu
  header: === Oneblock Mod Help ===

  # Color of the header in ChatColor. format
  header-color: GOLD

  # Commands
  cmds:
    - gamemode [player]
    - list
    - reload
    - tp <player|x,y>
    - user <player>
  
  # Color of the commands in ChatColor. format
  cmd-color: YELLOW

  # Messages corresponding to the commands
  msgs:
    - Changes between spectator gamemode and survival gamemode
    - Lists all the islands
    - Reloads the config (Has potential to reset current write operations)
    - Teleports to a player or a island
    - Shows user info

  # Color of the messages in ChatColor. format
  msg-color: GRAY

# Permission managing menu
perm-menu:
  # The titles of the user interface
  title:
    # Visitor permissions title
    visitor: Visitor Permission Manager GUI

    # Trusted permissions title
    trusted: Trusted Permission Manager GUI

  # Names to represent each permission (all "-" removed and then capitalized) (DO NOT EVER CHANGE OR IT WILL NOT WORK)
